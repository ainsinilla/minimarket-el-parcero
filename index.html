<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Minimarket El Parcero</title>

<meta name="theme-color" content="#ffffff">

<style>

:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#ececec;
--dark:#111827;
--whatsapp:#25D366;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
-webkit-tap-highlight-color: transparent;
}

body{
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
}

.wrapper{
width:100%;
max-width:430px;
}

.card{
background:var(--card);
border-radius:32px;
overflow:hidden;
box-shadow:
0 1px 3px rgba(0,0,0,.05),
0 20px 40px rgba(0,0,0,.08);
}

.hero{
text-align:center;
padding:30px 24px 15px;
}

.logo{
width:180px;
max-width:100%;
object-fit:cover;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.title{
margin-top:18px;
font-size:30px;
font-weight:700;
letter-spacing:-0.03em;
}

.subtitle{
margin-top:6px;
color:var(--muted);
font-size:15px;
}

.info{
padding:10px 24px 24px;
}

.row{
padding:16px 0;
border-bottom:1px solid var(--border);
}

.row:last-child{
border-bottom:none;
}

.label{
color:var(--muted);
font-size:13px;
margin-bottom:5px;
}

.value{
font-size:18px;
font-weight:600;
}

.actions{
padding:0 24px 24px;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:17px;
cursor:pointer;
font-size:16px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:.2s;
}

.btn:active{
transform:scale(.98);
}

.copy{
background:var(--dark);
color:white;
}

.whatsapp{
margin-top:12px;
background:var(--whatsapp);
color:white;
}

.icon{
width:20px;
height:20px;
fill:currentColor;
}

.note{
margin-top:18px;
text-align:center;
color:var(--muted);
font-size:13px;
line-height:1.5;
}

.toast{
position:fixed;
left:50%;
bottom:24px;
transform:translateX(-50%);
background:#111827;
color:white;
padding:13px 18px;
border-radius:999px;
font-size:14px;
opacity:0;
pointer-events:none;
transition:.25s;
}

.toast.show{
opacity:1;
}

@media(max-width:380px){

.title{
font-size:26px;
}

.value{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="hero">

<img src="logo.JPG" class="logo" alt="El Parcero">

<div class="title">
Minimarket El Parcero
</div>

<div class="subtitle">
Datos para transferencia bancaria
</div>

</div>

<div class="info">

<div class="row">
<div class="label">Titular</div>
<div class="value">Minimarket El Parcero</div>
</div>

<div class="row">
<div class="label">RUT</div>
<div class="value">78.141.261-9</div>
</div>

<div class="row">
<div class="label">Banco</div>
<div class="value">BancoEstado</div>
</div>

<div class="row">
<div class="label">Tipo de cuenta</div>
<div class="value">Cuenta Vista</div>
</div>

<div class="row">
<div class="label">Número de cuenta</div>
<div class="value">90279499459</div>
</div>

</div>

<div class="actions">

<button class="btn copy" onclick="copiarDatos()">

<svg class="icon" viewBox="0 0 24 24">
<path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/>
</svg>

Copiar datos de transferencia

</button>

<button class="btn whatsapp" onclick="enviarWhatsapp()">

<svg class="icon" viewBox="0 0 32 32">
<path fill="currentColor"
d="M16.04 3C8.84 3 3 8.72 3 15.77c0 2.5.73 4.95 2.1 7.05L3 29l6.4-2.06a13.2 13.2 0 0 0 6.64 1.79c7.2 0 13.04-5.72 13.04-12.77S23.24 3 16.04 3zm7.6 18.14c-.32.89-1.88 1.7-2.6 1.8-.67.09-1.52.13-2.46-.16-.57-.18-1.31-.43-2.25-.83-3.96-1.68-6.54-5.61-6.74-5.88-.19-.26-1.6-2.07-1.6-3.95 0-1.88.98-2.8 1.33-3.18.35-.38.76-.47 1.01-.47.25 0 .51 0 .73.01.23.01.54-.09.84.63.31.74 1.05 2.56 1.14 2.75.09.19.15.42.03.67-.12.25-.18.41-.36.63-.18.21-.38.47-.54.63-.18.18-.36.38-.16.74.2.36.89 1.45 1.91 2.35 1.31 1.15 2.42 1.51 2.78 1.68.36.18.57.15.78-.09.21-.25.89-1.03 1.13-1.38.24-.35.48-.29.81-.18.33.11 2.1.98 2.46 1.16.36.18.6.27.69.42.09.15.09.89-.23 1.78z"/>
</svg>

Enviar comprobante

</button>

<div class="note">
Después de transferir, envía tu comprobante por WhatsApp.
</div>

</div>

</div>

</div>

<div id="toast" class="toast">
Datos copiados
</div>

<script>

function mostrarToast(texto){

const toast = document.getElementById("toast");

toast.textContent = texto;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2500);

}

async function copiarDatos(){

const datos = `Minimarket El Parcero

RUT: 78.141.261-9
Banco: BancoEstado
Tipo de cuenta: Cuenta Vista
Número de cuenta: 90279499459`;

try{
await navigator.clipboard.writeText(datos);
mostrarToast("✓ Datos copiados");
}
catch{
mostrarToast("Error al copiar");
}

}

function enviarWhatsapp(){

window.open(
"https://wa.me/56945530169?text=Hola,%20adjunto%20comprobante%20de%20transferencia%20para%20Minimarket%20El%20Parcero.",
"_blank"
);

}

</script>

</body>
</html>
