<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Minimarket El Parcero</title>

<meta name="theme-color" content="#ffffff">

<style>

:root{
--bg:#f4f4f5;
--card:#ffffff;
--text:#18181b;
--muted:#71717a;
--border:#e4e4e7;
--dark:#18181b;
--success:#25D366;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
-webkit-tap-highlight-color: transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
}

.wrapper{
width:100%;
max-width:430px;
}

.card{
background:var(--card);
border-radius:32px;
overflow:hidden;
box-shadow:
0 1px 2px rgba(0,0,0,.05),
0 10px 30px rgba(0,0,0,.08);
}

.hero{
padding:28px 24px 10px;
text-align:center;
}

.logo{
width:180px;
max-width:100%;
object-fit:contain;
}

.title{
margin-top:14px;
font-size:30px;
font-weight:700;
letter-spacing:-0.03em;
}

.subtitle{
margin-top:6px;
color:var(--muted);
font-size:15px;
}

.info{
padding:14px 24px 24px;
}

.row{
padding:16px 0;
border-bottom:1px solid var(--border);
}

.row:last-child{
border-bottom:none;
}

.label{
color:var(--muted);
font-size:13px;
margin-bottom:5px;
}

.value{
font-size:18px;
font-weight:600;
letter-spacing:-0.02em;
}

.actions{
padding:0 24px 24px;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:17px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition:.2s;
}

.btn:active{
transform:scale(.98);
}

.copy{
background:var(--dark);
color:white;
}

.whatsapp{
background:var(--success);
color:white;
margin-top:12px;
}

.note{
margin-top:18px;
text-align:center;
color:var(--muted);
font-size:13px;
line-height:1.5;
}

.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background:#18181b;
color:white;
padding:13px 18px;
border-radius:999px;
font-size:14px;
opacity:0;
pointer-events:none;
transition:.25s;
}

.toast.show{
opacity:1;
}

@media(max-width:380px){

.title{
font-size:26px;
}

.value{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="hero">

<img src="logo.jpg" class="logo" alt="El Parcero">

<div class="title">
Minimarket El Parcero
</div>

<div class="subtitle">
Datos para transferencia bancaria
</div>

</div>

<div class="info">

<div class="row">
<div class="label">Titular</div>
<div class="value">Minimarket El Parcero</div>
</div>

<div class="row">
<div class="label">RUT</div>
<div class="value">78.141.261-9</div>
</div>

<div class="row">
<div class="label">Banco</div>
<div class="value">BancoEstado</div>
</div>

<div class="row">
<div class="label">Tipo de cuenta</div>
<div class="value">Cuenta Vista</div>
</div>

<div class="row">
<div class="label">Número de cuenta</div>
<div class="value">90279499459</div>
</div>

</div>

<div class="actions">

<button class="btn copy" onclick="copiarDatos()">
📋 Copiar datos de transferencia
</button>

<button class="btn whatsapp" onclick="enviarWhatsapp()">
💬 Enviar comprobante
</button>

<div class="note">
Después de transferir, envía tu comprobante por WhatsApp.
</div>

</div>

</div>

</div>

<div id="toast" class="toast">
Datos copiados
</div>

<script>

function toast(text){

const t = document.getElementById("toast");

t.textContent = text;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);

}

async function copiarDatos(){

const datos = `Minimarket El Parcero

RUT: 78.141.261-9
Banco: BancoEstado
Tipo de cuenta: Cuenta Vista
Número de cuenta: 90279499459`;

try{
await navigator.clipboard.writeText(datos);
toast("✓ Datos copiados");
}
catch{
toast("No fue posible copiar");
}

}

function enviarWhatsapp(){

window.open(
"https://wa.me/56945530169?text=Hola,%20adjunto%20comprobante%20de%20transferencia%20para%20Minimarket%20El%20Parcero.",
"_blank"
);

}

</script>

</body>
</html>
